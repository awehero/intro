<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Comparer</title>
    <link rel="icon" href="https://awehero.github.io/intro/awehero.png" type="image/png">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { border-collapse: collapse; width: 100%; background: #fff; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
		tr: { border-radius: 5px; }
        textarea { width: 100%; padding: 10px; font-family: monospace; }
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
            background-color: #f9f9f9;
            color: #333;
        }
        h1 {
            font-size: 2em;
            color: #007bff;
            margin-bottom: 10px;
        }
        div {
            margin-bottom: 10px;
            font-size: 1.2em;
        }
        p {
            margin-bottom: 10px;
            font-size: 1em;
        }
        textarea {
            width: 100%;
            max-width: 600px;
            padding: 10px;
            font-family: monospace;
            font-size: 1.7em;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }
        button {
            padding: 10px 20px;
            font-size: 1em;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }
        button:hover {
            background-color: #0056b3;
        }
        #output {
            background-color: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-family: monospace;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: auto;
            max-width: 100%;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        }
        #copyButton {
            margin-top: 10px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
		#suggestions {
			position: absolute;
		    max-height: 12em;
			width: 15em;
		    overflow: auto;
		    background-color: white;
		    border: 1px solid black;
			display: none;
			padding-left: 5px;
    		padding-right: 5px;
		}
		.suggestion-item {
			font-size: 1em;
			cursor: pointer;
			border: 2px solid black;
		    border-radius: 5px;
		    padding-left: 5px;
		}
		.suggestion-item:hover {
			background-color: #f0f0f0;
		}
		#videoContainers {
			width: 100%;
		    display: flex;
		    flex-wrap: nowrap;
		    justify-content: center;
		}
		#video1Container {
			width: 50%;
		}
		#video2Container {
			width: 50%;
		}
    </style>
</head>
    <body>
        <h1>Video Trimmer</h1>
		<div id="videoContainers">
			<div id="video1Container">
		        <p>Select a video you want to compare</p>
		        <input type="file" id="fileInput1" accept="video/*">
				<p>Or enter a YouTube link</p>
				<input type="text" id="link1">
				<br><br>
				
				<video id="video1" controls width="90%"></video>
				<iframe id="ytFrame1" width="90%" height="315" style="display:none;" frameborder="0" allowfullscreen></iframe>
				<br><br>
				
				<h2>Start</h2>
				<button id="setStart1" onclick="setStartF1()">Set</button>
				<button id="gotoStart1" onclick="gotoStartF1()">Go to Start</button>
				<p id="startLabel1">0:0:0.000</p>
				<br>
				<h2>End</h2>
				<button id="setEnd1" onclick="setEndF1()">Set</button>
				<button id="gotoEnd1" onclick="gotoEndF1()">Go to End</button>
				<p id="endLabel1">0:0:0.000</p>
				<br><br>
			</div>
	
			<div id="video2Container">
				<p>Select a video you want to compare</p>
		        <input type="file" id="fileInput2" accept="video/*">
				<p>Or enter a YouTube link</p>
				<input type="text" id="link2">
				<br><br>
				
				<video id="video2" controls width="90%"></video>
				<iframe id="ytFrame2" width="90%" height="315" style="display:none;" frameborder="0" allowfullscreen></iframe>
				<br><br>
				
				<h2>Start</h2>
				<button id="setStart2" onclick="setStartF2()">Set</button>
				<button id="gotoStart2" onclick="gotoStartF2()">Go to Start</button>
				<p id="startLabel2">0:0:0.000</p>
				<br>
				<h2>End</h2>
				<button id="setEnd2" onclick="setEndF2()">Set</button>
				<button id="gotoEnd2" onclick="gotoEndF2()">Go to End</button>
				<p id="endLabel2">0:0:0.000</p>
				<br><br>
			</div>
		</div>
		
		
		<script>
			const fileInput1 = document.getElementById("fileInput1");
			const video1 = document.getElementById("video1");
			const setStart1 = document.getElementById("setStart1");
			const setEnd1 = document.getElementById("setEnd1");
			const fileInput2 = document.getElementById("fileInput2");
			const video2 = document.getElementById("video2");
			const setStart2 = document.getElementById("setStart2");
			const setEnd2 = document.getElementById("setEnd2");
			
			const link1 = document.getElementById("link1");
			const link2 = document.getElementById("link2");
			const ytFrame1 = document.getElementById("ytFrame1");
			const ytFrame2 = document.getElementById("ytFrame2");
			
			let startTime1 = 0;
			let endTime1 = 0;
			let filename1 = "";
			let startTime2 = 0;
			let endTime2 = 0;
			let filename2 = "";
			
			let file1;
			let file2;
			
			fileInput1.addEventListener("change", function(event) {
			    file1 = event.target.files[0];
			    if (!file1) {
			        console.log("No file selected");
			        return;
			    }
				filename1 = file1.name.substring(0, file1.name.lastIndexOf("."));
			    console.log("File selected:", filename1);
			    const url = URL.createObjectURL(file1);
			    video1.src = url;
			    video1.load();
			    video1.onloadedmetadata = function() {
			        console.log("Metadata loaded");
			        console.log("Duration:", video1.duration);
					endTime1 = video1.duration
					endLabel1.innerText = calculateTime(endTime1);
			    };
			    video1.onloadeddata = function() {
			        console.log("Video fully ready");
			    };
			    video1.onerror = function(e) {
			        console.log("VIDEO ERROR:", e);
			    };
			});
			fileInput2.addEventListener("change", function(event) {
			    file2 = event.target.files[0];
			    if (!file2) {
			        console.log("No file selected");
			        return;
			    }
				filename2 = file2.name.substring(0, file2.name.lastIndexOf("."));
			    console.log("File selected:", filename2);
			    const url = URL.createObjectURL(file2);
			    video2.src = url;
			    video2.load();
			    video2.onloadedmetadata = function() {
			        console.log("Metadata loaded");
			        console.log("Duration:", video2.duration);
					endTime2 = video2.duration
					endLabel2.innerText = calculateTime(endTime2);
			    };
			    video2.onloadeddata = function() {
			        console.log("Video fully ready");
			    };
			    video2.onerror = function(e) {
			        console.log("VIDEO ERROR:", e);
			    };
			});
			
			video1.addEventListener("timeupdate", () => {
			    if (video1.currentTime > endTime1) {
			        video1.pause();
			        video1.currentTime = endTime1;
			    }
			});
			video2.addEventListener("timeupdate", () => {
			    if (video2.currentTime > endTime2) {
			        video2.pause();
			        video2.currentTime = endTime2;
			    }
			});

			link1.addEventListener("keydown", function(e) {
				if (e.key === "Enter") {
					loadYouTube(link1.value, video1, ytFrame1);
				}
			});
			
			link2.addEventListener("keydown", function(e) {
				if (e.key === "Enter") {
					loadYouTube(link2.value, video2, ytFrame2);
				}
			});

			function setStartF1() {
				if (video1.currentTime < endTime1) {
					startTime1 = video1.currentTime;
					startLabel1.innerText = calculateTime(startTime1);
				}
			}
			function setEndF1() {
				if (video1.currentTime > startTime1) {
					endTime1 = video1.currentTime;
					endLabel1.innerText = calculateTime(endTime1);
				}
			}
			function gotoStartF1() {
				video1.currentTime = startTime1;
				video1.play();
			}
			function gotoEndF1() {
				if (video1.duration > 5) {
					video1.currentTime = endTime1 - 5;
					video1.play();
				}
			}
			function setStartF2() {
				if (video2.currentTime < endTime2) {
					startTime2 = video2.currentTime;
					startLabel2.innerText = calculateTime(startTime2);
				}
			}
			function setEndF2() {
				if (video2.currentTime > startTime2) {
					endTime2 = video2.currentTime;
					endLabel2.innerText = calculateTime(endTime2);
				}
			}
			function gotoStartF2() {
				video2.currentTime = startTime2;
				video2.play();
			}
			function gotoEndF2() {
				if (video2.duration > 5) {
					video2.currentTime = endTime2 - 5;
					video2.play();
				}
			}

			function loadYouTube(input, videoEl, iframeEl) {
			    let id = null;
			
			    if (input.includes("youtube.com/watch?v=")) {
			        id = input.split("v=")[1].split("&")[0];
			    } else if (input.includes("youtu.be/")) {
			        id = input.split("youtu.be/")[1].split("?")[0];
			    }
			
			    if (!id) {
			        alert("Invalid YouTube URL");
			        return;
			    }
			
			    let embedURL = "https://www.youtube.com/embed/" + id;
			
			    iframeEl.src = embedURL;
			
			    iframeEl.style.display = "block";
			    videoEl.style.display = "none";
			}
			
			function calculateTime(s) {
			    let h = Math.floor(s/3600);
			    s = s - (h*3600);
			    let m = Math.floor(s/60);
			    s = s - (m*60);
			    let t = h+":"+Math.floor(m)+":"+Math.floor(s*1000)/1000;
			    return t;
			}
		</script>
    </body>
</html>
