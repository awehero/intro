<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Video Comparer</title>
		<link rel="icon" href="https://awehero.github.io/intro/awehero.png" type="image/png">
		<script src="https://www.youtube.com/iframe_api"></script>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 0;
				background: #111;
				color: white;
			}

			h1 {
				text-align: center;
				padding: 10px;
			}

			.container {
				display: flex;
				gap: 10px;
				padding: 10px;
			}

			.panel {
				flex: 1;
				background: #1c1c1c;
				padding: 10px;
				border-radius: 10px;
			}

			input {
				width: 100%;
				padding: 8px;
				margin-bottom: 10px;
				border-radius: 5px;
				border: none;
			}

			.player {
				position: relative;
				width: 100%;
				padding-top: 56.25%;
				background: black;
			}

			.player iframe {
				position: absolute;
				top: 0;
				left: 0;
				width: 100%;
				height: 100%;
			}

			.controls {
				margin-top: 10px;
			}

			button {
				margin: 3px;
				padding: 6px 10px;
				border: none;
				border-radius: 5px;
				background: #007bff;
				color: white;
				cursor: pointer;
			}

			button:hover {
				background: #0056b3;
			}

			.time {
				font-family: monospace;
			}

			.sync {
				text-align: center;
				margin-top: 10px;
			}
		</style>
	</head>
	<body>
		<h1>YouTube Video Comparer</h1>
		<div class="container">
			<div class="panel">
				<input id="link1" placeholder="Paste YouTube link">
				<div class="player">
					<div id="player1"></div>
				</div>
				<div class="controls">
					<button onclick="setStart(1)">Set Start</button>
					<button onclick="goStart(1)">Go Start</button>
					<div class="time" id="start1">0</div>
					<button onclick="setEnd(1)">Set End</button>
					<button onclick="goEnd(1)">Go End</button>
					<div class="time" id="end1">0</div>
				</div>
			</div>
			<div class="panel">
				<input id="link2" placeholder="Paste YouTube link">
				<div class="player">
					<div id="player2"></div>
				</div>
				<div class="controls">
					<button onclick="setStart(2)">Set Start</button>
					<button onclick="goStart(2)">Go Start</button>
					<div class="time" id="start2">0</div>
					<button onclick="setEnd(2)">Set End</button>
					<button onclick="goEnd(2)">Go End</button>
					<div class="time" id="end2">0</div>
				</div>
			</div>
		</div>
		<div class="sync">
			<button onclick="playBoth()">Play Both</button>
			<button onclick="pauseBoth()">Pause Both</button>
		</div>
		<script>
			let player1, player2;
			let start = {
				1: 0,
				2: 0
			};
			let end = {
				1: 0,
				2: 0
			};

			function extractID(url) {
				if (url.includes("v=")) return url.split("v=")[1].split("&")[0];
				if (url.includes("youtu.be/")) return url.split("youtu.be/")[1].split("?")[0];
				return null;
			}

			function createPlayer(num, videoId) {
				return new YT.Player("player" + num, {
					videoId: videoId
				});
			}
			link1.addEventListener("change", () => {
				const id = extractID(link1.value);
				if (!id) return alert("Invalid YouTube URL");
				player1 = createPlayer(1, id);
			});
			link2.addEventListener("change", () => {
				const id = extractID(link2.value);
				if (!id) return alert("Invalid YouTube URL");
				player2 = createPlayer(2, id);
			});

			function getPlayer(n) {
				return n === 1 ? player1 : player2;
			}

			function setStart(n) {
				const p = getPlayer(n);
				start[n] = p.getCurrentTime();
				document.getElementById("start" + n).innerText = start[n].toFixed(3);
			}

			function setEnd(n) {
				const p = getPlayer(n);
				end[n] = p.getCurrentTime();
				document.getElementById("end" + n).innerText = end[n].toFixed(3);
			}

			function goStart(n) {
				const p = getPlayer(n);
				p.seekTo(start[n]);
				p.playVideo();
			}

			function goEnd(n) {
				const p = getPlayer(n);
				p.seekTo(Math.max(end[n] - 5, 0));
				p.playVideo();
			}

			function playBoth() {
				if (player1) player1.playVideo();
				if (player2) player2.playVideo();
			}

			function pauseBoth() {
				if (player1) player1.pauseVideo();
				if (player2) player2.pauseVideo();
			}
			setInterval(() => {
				if (player1 && end[1] && player1.getCurrentTime() > end[1]) {
					player1.pauseVideo();
					player1.seekTo(end[1]);
				}
				if (player2 && end[2] && player2.getCurrentTime() > end[2]) {
					player2.pauseVideo();
					player2.seekTo(end[2]);
				}
			}, 100);
		</script>
	</body>
</html>
