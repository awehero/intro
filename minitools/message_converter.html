<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Message Converter for Ice Dodo</title>
  <link rel="icon" href="https://awehero.github.io/intro/awehero.png" type="image/png">
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        line-height: 1.6;
        background-color: #f9f9f9;
        color: #333;
    }
    h1 {
        font-size: 2em;
        color: #007bff;
        margin-bottom: 10px;
    }
    div {
        margin-bottom: 10px;
        font-size: 1.2em;
    }
    p {
        margin-bottom: 10px;
        font-size: 1em;
    }
    textarea {
        width: 100%;
        max-width: 600px;
        padding: 10px;
        font-family: monospace;
        font-size: 1em;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
    }
    button {
        padding: 10px 20px;
        font-size: 1em;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
    }
    button:hover {
        background-color: #0056b3;
    }
    #outputText {
        background-color: #f4f4f4;
        padding: 15px;
        border-radius: 5px;
        border: 1px solid #ddd;
        font-family: monospace;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-x: auto;
        max-width: 100%;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
    }
    #copyButton {
        margin-top: 10px;
    }
    .button-group {
        display: flex;
        gap: 10px;
        margin: 10px 0;
    }
    #mapMaker {
        display: inline;
        margin-left: 10px;
    }
</style>
<body>
  <h1>Message Converter for Ice Dodo</h1>
  <h2>Made By Awehero</h2>
  <form id="roundNumbersForm">
    <label for="inputString">Enter your message:</label><br>
    <textarea id="inputString" rows="4" cols="50"></textarea><br><br>
  </form>
  <h2>Output:</h2>
  <button id="copyButton" onclick="copyLink()">Copy!</button>
  <div id="result"></div>
  <script>
    let input = document.getElementById("inputString");
    let output = document.getElementById("result");
    let text = "";
    input.addEventListener('input', (event)=>{
        text = event.target.value;
        output.innerText = convert(text);
    });
    function convert(text) {
        let values = [];
        for (var i = 0; i < text.length; i++) {
            values.push(text[i].charCodeAt());
        }
        return values.join(':');
    }
    function copyLink() {
        if (document.getElementById("outputText").innerText != '') {
            navigator.clipboard.writeText(output.innerText);
        }
    }
  </script>
</body>
</html>
